<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fam.xgold.tech</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="container">
    <p class="wordmark">fam.xgold.tech</p>
    <h1>Sign in.</h1>
    <p class="subtitle">Enter your email to continue.</p>

    <div class="login-card">

      <!-- Step 1: Email -->
      <form class="step" id="step-email" novalidate>
        <input class="field" id="email-input" type="email" name="email"
          placeholder="Email address" autocomplete="email" inputmode="email" required />
        <div class="msg msg-error" id="email-error" hidden></div>
        <button class="btn btn-primary" type="submit" id="continue-btn">Continue</button>
      </form>

      <!-- Step 2a: Password -->
      <form class="step" id="step-password" hidden novalidate>
        <p class="msg msg-info" id="email-display"></p>
        <input class="field" id="password-input" type="password" name="password"
          placeholder="Password" autocomplete="current-password" required />
        <div class="msg msg-error" id="password-error" hidden></div>
        <button class="btn btn-primary" type="submit" id="signin-btn">Sign in</button>
        <button class="back-link" type="button" id="back-from-password">Use a different email</button>
      </form>

      <!-- Step 2b: Create account -->
      <form class="step" id="step-register" hidden novalidate>
        <p class="msg msg-info" id="register-email-display"></p>
        <input class="field" id="register-name" type="text" name="name"
          placeholder="Your name" autocomplete="name" required />
        <input class="field" id="register-password" type="password" name="new-password"
          placeholder="Choose a password" autocomplete="new-password" required />
        <input class="field" id="register-confirm" type="password" name="confirm-password"
          placeholder="Confirm password" autocomplete="new-password" required />
        <div class="msg msg-error" id="register-error" hidden></div>
        <button class="btn btn-primary" type="submit" id="register-btn">Request access</button>
        <button class="back-link" type="button" id="back-from-register">Use a different email</button>
      </form>

      <!-- Step 2c: Pending -->
      <div class="step" id="step-pending" hidden>
        <p class="msg msg-info">
          Your account is awaiting approval.<br />We'll be in touch soon.
        </p>
        <button class="back-link" type="button" id="back-from-pending">Use a different email</button>
      </div>

      <!-- Step 3: Submitted -->
      <div class="step" id="step-submitted" hidden>
        <p class="msg msg-success">
          Your request has been sent — we'll review it shortly.
        </p>
      </div>

    </div>
  </div>

  <script src="/login.js"></script>
</body>
</html>
