<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fam.xgold.tech</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    /* member-page extras */
    .member-card { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
    .btn-signout {
      display: inline-block;
      padding: 0.65em 1.5em;
      border: 1px solid var(--c-border);
      border-radius: var(--radius-pill);
      background: transparent;
      color: var(--c-text);
      font-size: 0.9375rem;
      font-family: inherit;
      cursor: pointer;
      transition: background 200ms var(--ease-out), border-color 200ms var(--ease-out);
      width: auto;
    }
    .btn-signout:hover { background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.25); }
    @media (prefers-reduced-motion: reduce) { .btn-signout { transition: none; } }
  </style>
</head>
<body>
  <div class="container">
    <p class="wordmark">fam.xgold.tech</p>
    <div class="member-card">
      <h1>Welcome home.</h1>
      <p class="subtitle">
        More coming soon. This space is for family &amp; friends — we're glad you're here.
      </p>
      <button class="btn-signout" id="logout-btn">Sign out</button>
    </div>
  </div>

  <script>
    const API = 'https://api.fam.xgold.tech';

    // Verify session before showing the page; redirect if not logged in
    fetch(API + '/api/me', { credentials: 'include' })
      .then(res => { if (!res.ok) window.location.href = '/'; })
      .catch(() => { window.location.href = '/'; });

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await fetch(API + '/api/logout', { method: 'POST', credentials: 'include' });
      window.location.href = '/';
    });
  </script>
</body>
</html>
